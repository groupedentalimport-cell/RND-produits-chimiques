version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: chemstab-db
    environment:
      POSTGRES_DB: chemstab_industrial
      POSTGRES_USER: ${POSTGRES_USER:-chemstab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemstab -d chemstab_industrial"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chemstab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chemstab-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chemstab}:${POSTGRES_PASSWORD:-changeme}@db:5432/chemstab_industrial
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
      - uploads:/app/uploads
      - exports:/app/exports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chemstab-celery
    environment:
      DATABASE_URL: postgresql://chemstab:chemstab@db:5432/chemstab_industrial
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chemstab-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ml_models:
  uploads:
  exports:
