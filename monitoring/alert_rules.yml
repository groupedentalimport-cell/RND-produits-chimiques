# Prometheus Alert Rules for ChemStab Industrial
# GxP-relevant alerts for pharmaceutical compliance

groups:
  - name: chemstab_critical
    rules:
      # ── API Availability ─────────────────────────────────────────────
      - alert: API_Down
        expr: up{job="chemstab-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ChemStab API is DOWN"
          description: "Backend API has been unreachable for more than 1 minute."

      - alert: High_Error_Rate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "More than 10% of requests returning 5xx errors."

      # ── Response Time ────────────────────────────────────────────────
      - alert: Slow_API_Response
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time > 5s (p95)"
          description: "95th percentile response time exceeds 5 seconds."

      # ── Database ─────────────────────────────────────────────────────
      - alert: Database_Down
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL/Supabase is DOWN"
          description: "Database has been unreachable for more than 1 minute."

      - alert: High_DB_Connections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection count"
          description: "More than 80 active database connections."

      # ── Redis ────────────────────────────────────────────────────────
      - alert: Redis_Down
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis is DOWN"
          description: "Redis cache is unreachable."

      # ── System Resources ─────────────────────────────────────────────
      - alert: High_CPU_Usage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage (>85%)"
          description: "CPU usage has been above 85% for 10 minutes."

      - alert: High_Memory_Usage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage (>90%)"
          description: "Memory usage above 90% for 5 minutes."

      - alert: Low_Disk_Space
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space (>85% used)"
          description: "Disk usage above 85%."

      # ── Rate Limiting ────────────────────────────────────────────────
      - alert: High_Rate_Limit_Triggers
        expr: rate(rate_limited_requests_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit trigger rate"
          description: "More than 10 requests/second being rate limited."

      # ── Audit Trail ──────────────────────────────────────────────────
      - alert: Audit_Trail_Gap
        expr: increase(audit_log_entries_total[1h]) == 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "No audit entries in 2 hours"
          description: "Audit trail may be broken — no entries logged in 2 hours."
