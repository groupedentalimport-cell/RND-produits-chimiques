# ChemStab Industrial — CI Pipeline
# Runs tests, linting, and security checks on every push/PR

name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check backend/app/ backend/tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/app/ backend/tests/

  # ── Unit Tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run unit tests
        working-directory: backend
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x \
            -m "not slow and not integration and not ml"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Security Scan ────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety pip-audit

      - name: Check dependencies for vulnerabilities
        working-directory: backend
        run: pip-audit -r requirements.txt || true

      - name: Check for hardcoded secrets
        run: |
          # Scan for potential secrets
          if grep -rn "SECRET_KEY.*=.*['\"]CHANGE" backend/app/; then
            echo "⚠️ WARNING: Default SECRET_KEY found in code"
          fi
          if grep -rn "password.*=.*['\"]" backend/app/core/config.py; then
            echo "⚠️ WARNING: Hardcoded password found"
          fi

  # ── Frontend Build ───────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
